<!-- public/offline.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You Are Offline</title>
    <style>
        :root {
            --bg: #080808; 
            --secondary: #f4f4f4; 
            --theme: #00ffee;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 20px;
            background-color: var(--bg);
            color: var(--secondary);
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .text-box {
            background-color: var(--bg);
            color: var(--secondary);
            padding: 30px;
            border-radius: 4px;
            border: 4px solid var(--bg);
            box-shadow: 0 0 20px var(--theme);
            max-width: 400px; 
            cursor: pointer;
        }

        .text-box h1 {
            color: var(--theme);
            font-size: 2.5rem;
            margin: 1rem 0;
        }

        .text-box p {
            font-size: 1.25rem;
            margin: 0 1rem 10px;
        }

        .aspect-square {
            width: 100%; 
            padding-top: 100%;
            position: relative;
            overflow: hidden;
            border-radius: 50%;
            background-color: var(--theme);
            box-shadow: 0 0 20px var(--theme);
            margin-bottom: 2rem;
        }

        .aspect-square img {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: auto; 
            transform: translate(-50%, -50%); 
        }

        .text-box:hover {
            box-shadow: 0 0 1.8rem var(--theme); 
        }
    </style>
</head>
<body>
    <div class="text-box">
        <div class="aspect-square">
            <img src="About.png" alt="Offline" /> 
        </div>
        <h1>You are Offline</h1>
        <p>It seems you don't have an internet connection. Please check your connection and try again.</p>
        <a href="/" style="color: var(--theme); text-decoration: none; font-size: 1rem; margin-top: 20px;">Return to Home</a>
    </div>
</body>
</html>
